<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FAF6F0; font-family: sans-serif; }

    .test1 {
      padding: 40px 24px;
    }
    .test1 input {
      display: block;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: 2px solid #C96A3A;
      border-radius: 12px;
      margin-bottom: 16px;
      background: white;
    }

    .test2 {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(250,246,240,0.95);
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      width: 90%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    }
    .card input {
      display: block;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: 2px solid #C96A3A;
      border-radius: 12px;
      margin-bottom: 16px;
      background: #FAF6F0;
    }
    h3 { margin-bottom: 12px; font-size: 14px; color: #666; }
    .result {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: #000;
      color: #0f0;
      padding: 12px;
      border-radius: 10px;
      font-size: 12px;
      font-family: monospace;
    }
  </style>
</head>
<body>

<!-- Тест 1: обычный div -->
<div class="test1" id="t1" style="display:none">
  <h3>Тест 1: обычный div (не fixed)</h3>
  <input type="email" placeholder="email" onfocus="log('T1 email: ФОКУС')" />
  <input type="password" placeholder="password" onfocus="log('T1 pass: ФОКУС')" />
  <button onclick="showTest(2)">Следующий тест →</button>
</div>

<!-- Тест 2: position fixed overlay -->
<div class="test2" id="t2" style="display:none">
  <div class="card">
    <h3>Тест 2: position fixed + card</h3>
    <input type="email" placeholder="email" onfocus="log('T2 email: ФОКУС')" />
    <input type="password" placeholder="password" onfocus="log('T2 pass: ФОКУС')" />
    <button onclick="showTest(3)">Следующий тест →</button>
  </div>
</div>

<!-- Тест 3: fixed с safe area padding -->
<div class="test2" id="t3" style="display:none; padding-top: env(safe-area-inset-top);">
  <div class="card">
    <h3>Тест 3: fixed + safe-area padding</h3>
    <input type="email" placeholder="email" onfocus="log('T3 email: ФОКУС')" />
    <input type="password" placeholder="password" onfocus="log('T3 pass: ФОКУС')" />
    <button onclick="showTest(1)">Начать заново</button>
  </div>
</div>

<div class="result" id="result">
  PWA: <span id="pwa">...</span><br>
  Лог: <span id="log">тапни в инпут</span>
</div>

<script>
  document.getElementById('pwa').textContent = 
    window.navigator.standalone ? 'ДА (standalone)' : 'НЕТ (браузер)'

  function showTest(n) {
    document.getElementById('t1').style.display = 'none'
    document.getElementById('t2').style.display = 'none'
    document.getElementById('t3').style.display = 'none'
    document.getElementById('t' + n).style.display = n === 1 ? 'block' : 'flex'
    log('Показан тест ' + n)
  }

  function log(msg) {
    document.getElementById('log').textContent = msg
  }

  showTest(1)
</script>
</body>
</html>
